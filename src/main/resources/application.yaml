spring:
  application:
    name: assignment
  datasource:
    url: ${SPRING_DATASOURCE_URL:}
    username: ${SPRING_DATASOURCE_USERNAME:}
    password: ${SPRING_DATASOURCE_PASSWORD:}
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
    show-sql: ${SPRING_JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_FORMAT_SQL:false}
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:${SERVER_PORT:8080}}

app:
  bootstrap:
    enabled: ${APP_BOOTSTRAP_ENABLED:false}
    viewer:
      username: ${APP_BOOTSTRAP_VIEWER_USERNAME:}
      password: ${APP_BOOTSTRAP_VIEWER_PASSWORD:}
    analyst:
      username: ${APP_BOOTSTRAP_ANALYST_USERNAME:}
      password: ${APP_BOOTSTRAP_ANALYST_PASSWORD:}
    admin:
      username: ${APP_BOOTSTRAP_ADMIN_USERNAME:}
      password: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha
