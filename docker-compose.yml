services:
  db:
    image: postgres:16-alpine
    container_name: zorvyn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zorvyn-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
      APP_BOOTSTRAP_ENABLED: ${APP_BOOTSTRAP_ENABLED:false}
      APP_BOOTSTRAP_VIEWER_USERNAME: ${APP_BOOTSTRAP_VIEWER_USERNAME:}
      APP_BOOTSTRAP_VIEWER_PASSWORD: ${APP_BOOTSTRAP_VIEWER_PASSWORD:}
      APP_BOOTSTRAP_ANALYST_USERNAME: ${APP_BOOTSTRAP_ANALYST_USERNAME:}
      APP_BOOTSTRAP_ANALYST_PASSWORD: ${APP_BOOTSTRAP_ANALYST_PASSWORD:}
      APP_BOOTSTRAP_ADMIN_USERNAME: ${APP_BOOTSTRAP_ADMIN_USERNAME:}
      APP_BOOTSTRAP_ADMIN_PASSWORD: ${APP_BOOTSTRAP_ADMIN_PASSWORD:}
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
